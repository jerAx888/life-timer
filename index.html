<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Special+Elite&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Special Elite', serif;
      background-color: #2b1d0e;
      background-image:
        repeating-linear-gradient(90deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 60px),
        repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 1px, transparent 1px, transparent 60px);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .paper {
      position: relative;
      background: #f5e6c8;
      border: 2px solid #8b6340;
      border-radius: 4px;
      box-shadow: 6px 6px 0 #6b4a2a, inset 0 0 40px rgba(139,90,43,0.08);
    }
    .paper::before {
      content: '';
      position: absolute;
      inset: 5px;
      border: 1px dashed rgba(139,90,43,0.25);
      border-radius: 2px;
      pointer-events: none;
    }

    .timer-card {
      padding: 2.8rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      width: 420px;
    }

    h1 {
      font-family: 'IM Fell English', serif;
      font-size: 24px;
      font-weight: 400;
      color: #3b2008;
      letter-spacing: 0.06em;
      text-align: center;
    }
    h1 em { font-style: italic; color: #7a4a1e; }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, #8b6340, transparent);
    }

    /* Manual input — big and prominent */
    .manual-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .manual-label {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 13px;
      color: #7a4a1e;
      letter-spacing: 0.04em;
    }

    .manual-inputs {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .input-group input {
      width: 80px;
      text-align: center;
      font-family: 'Special Elite', serif;
      font-size: 28px;
      color: #3b2008;
      background: #ede0c4;
      border: 2px solid #8b6340;
      border-radius: 2px;
      padding: 8px 4px;
      box-shadow: inset 1px 1px 0 rgba(139,90,43,0.2), 2px 2px 0 #6b4a2a;
      outline: none;
    }
    .input-group input:focus {
      border-color: #5a3410;
      background: #e8d4a8;
    }

    .input-group span {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 11px;
      color: #a07040;
      letter-spacing: 0.06em;
    }

    .colon {
      font-size: 36px;
      color: #a07040;
      font-family: 'Special Elite', serif;
      margin-bottom: 20px;
    }

    .set-btn {
      padding: 8px 32px;
      border-radius: 2px;
      border: 2px solid #8b6340;
      background: #ede0c4;
      color: #3b2008;
      font-family: 'Special Elite', serif;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #6b4a2a;
      letter-spacing: 0.05em;
    }
    .set-btn:hover { background: #e4d0aa; }
    .set-btn:active { transform: translate(2px,2px); box-shadow: none; }

    /* Countdown display */
    .digits {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .box {
      background: #ede0c4;
      border: 2px solid #8b6340;
      border-radius: 4px;
      box-shadow: 2px 2px 0 #6b4a2a, inset 0 0 12px rgba(139,90,43,0.1);
      width: 96px;
      height: 96px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Special Elite', serif;
      font-size: 48px;
      color: #3b2008;
      font-variant-numeric: tabular-nums;
      transition: background 0.2s;
    }
    .box.tick  { background: #e8d4a8; }
    .box.alarm { background: #c0392b; color: #f5e6c8; border-color: #922b21; }

    .box-label {
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 12px;
      color: #7a4a1e;
      letter-spacing: 0.05em;
    }

    .sep {
      font-size: 44px;
      color: #a07040;
      margin-bottom: 26px;
      font-family: 'IM Fell English', serif;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #d4b896;
      border: 1px solid #8b6340;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #7a4a1e;
      transition: width 0.8s linear;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 9px 26px;
      border-radius: 2px;
      border: 2px solid #8b6340;
      background: #ede0c4;
      color: #3b2008;
      font-family: 'Special Elite', serif;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #6b4a2a;
      letter-spacing: 0.04em;
    }
    .btn:hover { background: #e4d0aa; }
    .btn:active { transform: translate(2px,2px); box-shadow: none; }

    .btn.primary {
      background: #7a4a1e;
      border-color: #5a3410;
      color: #f5e6c8;
      box-shadow: 2px 2px 0 #3b2008;
    }
    .btn.primary:hover { background: #8b5a2a; }

    .btn.alarm-btn {
      background: #c0392b;
      border-color: #922b21;
      color: #fff;
      box-shadow: 2px 2px 0 #7b241c;
      display: none;
      animation: pulse 0.5s infinite alternate;
    }
    @keyframes pulse { from { opacity:1; } to { opacity:0.65; } }

    .flourish { position: absolute; font-size: 20px; color: #8b6340; opacity: 0.4; line-height: 1; pointer-events: none; }
    .fl-tl { top: 9px; left: 12px; }
    .fl-tr { top: 9px; right: 12px; transform: scaleX(-1); }
    .fl-bl { bottom: 9px; left: 12px; transform: scaleY(-1); }
    .fl-br { bottom: 9px; right: 12px; transform: scale(-1,-1); }
  </style>
</head>
<body>

<div class="timer-card paper">
  <span class="flourish fl-tl">❧</span>
  <span class="flourish fl-tr">❧</span>
  <span class="flourish fl-bl">❧</span>
  <span class="flourish fl-br">❧</span>

  <h1><em>Life</em> Timer</h1>
  <div class="divider"></div>

  <!-- Manual time setter -->
  <div class="manual-section">
    <div class="manual-label">— set your time —</div>
    <div class="manual-inputs">
      <div class="input-group">
        <input type="number" id="inH" min="0" max="99" value="2" />
        <span>hours</span>
      </div>
      <div class="colon">:</div>
      <div class="input-group">
        <input type="number" id="inM" min="0" max="59" value="0" />
        <span>minutes</span>
      </div>
      <div class="colon">:</div>
      <div class="input-group">
        <input type="number" id="inS" min="0" max="59" value="0" />
        <span>seconds</span>
      </div>
    </div>
    <button class="set-btn" onclick="applyManual()">Set Time</button>
  </div>

  <div class="divider"></div>

  <!-- Countdown display -->
  <div class="digits">
    <div class="unit"><div class="box" id="dh">02</div><div class="box-label">hours</div></div>
    <div class="sep">·</div>
    <div class="unit"><div class="box" id="dm">00</div><div class="box-label">minutes</div></div>
    <div class="sep">·</div>
    <div class="unit"><div class="box" id="ds">00</div><div class="box-label">seconds</div></div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:100%"></div></div>

  <div class="controls">
    <button class="btn primary" id="startBtn" onclick="toggleTimer()">Start</button>
    <button class="btn" onclick="resetTimer()">Reset</button>
    <button class="btn alarm-btn" id="stopAlarmBtn" onclick="stopAlarm()">⏰Stop</button>
  </div>

  <div class="divider"></div>
</div>

<script>
  let total = 7200, remaining = 7200, running = false;
  let timerInterval = null, alarmInterval = null, flashInterval = null, alarmCtx = null;

  function pad(n) { return String(n).padStart(2,'0'); }

  function render() {
    const h = Math.floor(remaining / 3600);
    const m = Math.floor((remaining % 3600) / 60);
    const s = remaining % 60;
    document.getElementById('dh').textContent = pad(h);
    document.getElementById('dm').textContent = pad(m);
    document.getElementById('ds').textContent = pad(s);
    document.getElementById('prog').style.width = (total > 0 ? (remaining/total)*100 : 0) + '%';
  }

  function playAlarmLoop() {
    try {
      alarmCtx = new (window.AudioContext || window.webkitAudioContext)();
      function scheduleBeeps() {
        if (!alarmCtx) return;
        const now = alarmCtx.currentTime;
        [0, 0.28, 0.56].forEach(t => {
          const osc = alarmCtx.createOscillator();
          const gain = alarmCtx.createGain();
          osc.connect(gain); gain.connect(alarmCtx.destination);
          osc.frequency.value = 920;
          osc.type = 'square';
          gain.gain.setValueAtTime(0.22, now + t);
          gain.gain.exponentialRampToValueAtTime(0.001, now + t + 0.2);
          osc.start(now + t);
          osc.stop(now + t + 0.22);
        });
      }
      scheduleBeeps();
      alarmInterval = setInterval(scheduleBeeps, 1100);
    } catch(e) {}
  }

  function startAlarm() {
    playAlarmLoop();
    let flash = false;
    flashInterval = setInterval(() => {
      flash = !flash;
      document.querySelectorAll('.box').forEach(b => b.classList.toggle('alarm', flash));
    }, 380);
    document.getElementById('stopAlarmBtn').style.display = 'inline-block';
    document.getElementById('startBtn').style.display = 'none';
  }

  function stopAlarm() {
    clearInterval(alarmInterval); alarmInterval = null;
    clearInterval(flashInterval); flashInterval = null;
    if (alarmCtx) { try { alarmCtx.close(); } catch(e){} alarmCtx = null; }
    document.querySelectorAll('.box').forEach(b => b.classList.remove('alarm'));
    document.getElementById('stopAlarmBtn').style.display = 'none';
    document.getElementById('startBtn').style.display = 'inline-block';
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(timerInterval); timerInterval = null;
      running = false;
      document.getElementById('startBtn').textContent = 'Start';
      startAlarm();
      return;
    }
    remaining--;
    render();
    document.querySelectorAll('.box').forEach(b => b.classList.add('tick'));
    setTimeout(() => document.querySelectorAll('.box').forEach(b => b.classList.remove('tick')), 110);
  }

  function toggleTimer() {
    if (remaining <= 0) return;
    running = !running;
    document.getElementById('startBtn').textContent = running ? 'Pause' : 'Resume';
    if (running) { timerInterval = setInterval(tick, 1000); }
    else { clearInterval(timerInterval); timerInterval = null; }
  }

  function resetTimer() {
    clearInterval(timerInterval); timerInterval = null;
    stopAlarm();
    running = false;
    remaining = total;
    document.getElementById('startBtn').textContent = 'Start';
    document.getElementById('startBtn').style.display = 'inline-block';
    render();
  }

  function applyManual() {
    const h = Math.max(0, parseInt(document.getElementById('inH').value) || 0);
    const m = Math.min(59, Math.max(0, parseInt(document.getElementById('inM').value) || 0));
    const s = Math.min(59, Math.max(0, parseInt(document.getElementById('inS').value) || 0));
    clearInterval(timerInterval); timerInterval = null;
    stopAlarm();
    running = false;
    total = h*3600 + m*60 + s;
    remaining = total;
    document.getElementById('startBtn').textContent = 'Start';
    document.getElementById('startBtn').style.display = 'inline-block';
    render();
  }

  render();
</script>
</body>
</html>
